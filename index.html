<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuantGrowth PWA</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
</head>
<body>
  <div class="container">
    <header>
      <h1>QuantGrowth Terminal</h1>
      <div id="status-bar" class="status-bar">⏳ Sincronizando...</div>
    </header>

    <!-- Tarjetas KPI -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <h3>Total Activos</h3>
        <p id="kpi-total">0</p>
      </div>
      <div class="kpi-card ideal">
        <h3>Entrada Ideal</h3>
        <p id="kpi-ideal">0</p>
      </div>
      <div class="kpi-card momentum">
        <h3>Rebote / Momentum</h3>
        <p id="kpi-momentum">0</p>
      </div>
      <div class="kpi-card sobre">
        <h3>Sobreextendidos</h3>
        <p id="kpi-sobre">0</p>
      </div>
    </div>

    <!-- Controles de Búsqueda -->
    <div class="controls">
      <input type="text" id="search-input" placeholder="🔍 Buscar ticker o sector..." autocomplete="off">
    </div>

    <!-- Tabla Principal -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Sector</th>
            <th>Precio</th>
            <th>EMA20</th>
            <th>Dist. EMA20</th>
            <th>Dist. SMA50</th>
            <th>Ventas YoY</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="8" class="text-center">Cargando datos automáticamente...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
